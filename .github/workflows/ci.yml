# CI: тесты и production-сборка на push/PR и вручную (Actions → CI → Run workflow).
name: CI

on:
  workflow_dispatch:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-and-build:
    name: Test & build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build
        env:
          # Минимум для прохождения сборки Nitro без локального .env
          NUXT_SESSION_SECRET: ci-build-placeholder-secret-min-32-chars-xx
          NUXT_PUBLIC_SITE_URL: https://example.invalid

      - name: Integration tests (Nitro HTTP)
        run: npm run test:integration
